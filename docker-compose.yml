services:
  db:
    image: postgres:16-alpine
    container_name: chess-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chessdb}
      POSTGRES_USER: ${POSTGRES_USER:-chess}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chess}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chess} -d ${POSTGRES_DB:-chessdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: chess-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://chess:chess@db:5432/chessdb}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-10080}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads:z

  frontend:
    volumes:
    - ./frontend:/app:z
    - /app/node_modules
    ports:
    - "3000:3000"
    build:
      context: ./frontend
    container_name: chess-frontend
    environment:
      VITE_API_BASE_URL: ${API_BASE_URL:-https://localhost:8080/api/v1}
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
    container_name: chess-nginx
    ports:
      - "8080:443"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
